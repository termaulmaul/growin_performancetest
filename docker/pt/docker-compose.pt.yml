# PT Local Docker Compose
# Profiles:
#   mock           -> k6-runner + mock-api
#   real           -> k6-runner only (against real INT)
#   observability  -> add influxdb + grafana
version: '3.9'

services:
  k6-runner:
    image: grafana/k6:0.51.0
    profiles: ["mock", "real", "observability"]
    working_dir: /work
    volumes:
      - ../../:/work
    env_file:
      - .env.pt
    # When ENV=INT and pointing at mock, use extra_hosts to route real DNS to mock-api.
    extra_hosts:
      - "internal-api-pt.growin.id:host-gateway"
    entrypoint: ["/bin/sh", "/work/docker/pt/scripts/run-k6-local.sh"]
    depends_on:
      mock-api:
        condition: service_started
        required: false
    networks: [pt-net]

  mock-api:
    profiles: ["mock"]
    build:
      context: ./mock-api
      dockerfile_inline: |
        FROM node:20-alpine
        WORKDIR /app
        COPY package.json .
        COPY server.js .
        EXPOSE 8088
        CMD ["node","server.js"]
    environment:
      PORT: "8088"
      MOCK_STATUS: "${MOCK_STATUS:-200}"
      MOCK_LATENCY_MS: "${MOCK_LATENCY_MS:-50}"
    ports:
      - "8088:8088"
    networks: [pt-net]

  influxdb:
    profiles: ["observability"]
    image: influxdb:1.8
    environment:
      INFLUXDB_DB: k6
    ports:
      - "8086:8086"
    networks: [pt-net]

  grafana:
    profiles: ["observability"]
    image: grafana/grafana:10.4.2
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
    ports:
      - "3000:3000"
    depends_on: [influxdb]
    networks: [pt-net]

networks:
  pt-net:
