bp_id: "BP001"
bp_name: "CorporateActionsCalendarOrder"
description: "Corporate Actions Calendar Order - Detail & Selected Date"
developer: "I Putu Wisnuadi Prabawa Bukian"

# Threshold override per BP (optional - will use global default if not set)
thresholds:
  avg_response_time_ms: 200   # avrg < 200ms
  error_rate_percent: 0.1     # < 0.1% error rate
  min_rps: 400                # minimum requests per second

# List of APIs to test — script will iterate one by one
apis:
  - id: "001_01_01"
    name: "CorporateActionsCalendarOrderDetail_SelectedDate"
    method: "GET"
    path: "/corporate-actions/api/v1/protected/calendar/order/detail"
    payload: null
    # Optional query params (will be appended to path)
    query_params:
      date: "2025-01-07"
      type: "DIVIDEND"

  - id: "001_01_02"
    name: "CorporateActionsCalendarOrder_List"
    method: "GET"
    path: "/corporate-actions/api/v1/protected/calendar/order"
    payload: null
    query_params:
      page: "1"
      size: "10"

  - id: "001_02_01"
    name: "CorporateActionsCalendarOrder_Create"
    method: "POST"
    path: "/corporate-actions/api/v1/protected/calendar/order"
    payload:
      stock_code: "BBCA"
      quantity: 100
      order_type: "BUY"
    query_params: null

  - id: "001_02_02"
    name: "CorporateActionsCalendarOrder_Update"
    method: "PUT"
    path: "/corporate-actions/api/v1/protected/calendar/order/{id}"
    path_params:
      id: "12345"
    payload:
      quantity: 200
      order_type: "BUY"
    query_params: null

  - id: "001_02_03"
    name: "CorporateActionsCalendarOrder_Patch"
    method: "PATCH"
    path: "/corporate-actions/api/v1/protected/calendar/order/{id}/status"
    path_params:
      id: "12345"
    payload:
      status: "CANCELLED"
    query_params: null