bp_id: "BP001"
bp_name: "EIPO"
description: "EIPO Mock Order"
developer: "M Sidik Augi Rahmat"

# Threshold override per BP (optional - will use global default if not set)
thresholds:
  avg_response_time_ms: 200   # avrg < 200ms
  error_rate_percent: 0.1     # < 0.1% error rate
  min_rps: 381                # minimum requests per second

# List of APIs to test — script will iterate one by one
apis:
  - id: "001_01_01"
    name: "EIPO_Mock_Order_POST"
    method: "POST"
    path: "/eipo/mock/order"
    payload: 
      pipeline: "ABCD"
      price: "1000"
      qty: "10"
      is_employee: "false"
      is_affiliated: "false"
      is_beneficiary_owner: "false"
      is_esa: "false"
      is_automatic_confirmation: false
    query_params: null

  - id: "001_01_02"
    name: "EIPO_Mock_Order_PATCH"
    method: "PATCH"
    path: "/eipo/mock/order"
    payload: 
      id: "ORD-123456"
      qty: "500"
    query_params: null